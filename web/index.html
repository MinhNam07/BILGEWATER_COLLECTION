<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0d1117">
    <meta name="apple-mobile-web-app-capable" content="yes">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech&display=swap" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">

    <title>Riftbound Card Inventory</title>
</head>
<body>
    <div class="app-shell">
        <header class="sticky-top app-header">
            <div class="container hero py-3">
                <div class="d-flex align-items-center justify-content-between gap-2">
                    <h1 class="mb-0 share-tech-regular app-title">Riftbound Card Inventory</h1>
                    <button type="button" class="btn btn-outline-secondary btn-sm settings-btn" id="settingsBtn" aria-label="Settings" title="Sync settings">
                        &#9881;
                    </button>
                </div>
            </div>

            <div class="container pb-2">
                <div class="row justify-content-center">
                    <div class="btn-group flex-wrap filter-buttons" role="group" aria-label="Card type filters">
                        <button type="button" class="btn btn-outline-primary filter-button active" data-filter="All">All</button>
                        <button type="button" class="btn btn-outline-primary filter-button" data-filter="Legend">Legend</button>
                        <button type="button" class="btn btn-outline-primary filter-button" data-filter="Unit">Unit</button>
                        <button type="button" class="btn btn-outline-primary filter-button" data-filter="Rune">Rune</button>
                        <button type="button" class="btn btn-outline-primary filter-button" data-filter="Spell">Spell</button>
                        <button type="button" class="btn btn-outline-primary filter-button" data-filter="Gear">Gear</button>
                        <button type="button" class="btn btn-outline-primary filter-button" data-filter="Battlefield">Battlefield</button>
                        <button type="button" class="btn btn-outline-primary filter-button" data-filter="Token">Token</button>
                    </div>
                </div>

                <div class="d-flex flex-wrap align-items-center justify-content-center gap-3 mt-3">
                    <h6 id="totalCardCount" class="mb-0 share-tech-regular-v2">Owned: 0</h6>
                    <div class="form-check form-switch owned-only-switch">
                        <input class="form-check-input" type="checkbox" id="ownedOnlyToggle">
                        <label class="form-check-label" for="ownedOnlyToggle">Owned only</label>
                    </div>
                    <span id="syncStatus" class="sync-status text-muted small" aria-live="polite"></span>
                </div>

                <div class="mt-2">
                    <input class="form-control searchBar mx-auto" type="search" placeholder="Search by card name or set number" autocomplete="off">
                </div>
            </div>
        </header>

        <div id="cardList" class="container pt-3 pb-5">
            <div id="cardRow" class="row g-3"></div>
        </div>
        <p id="noResults" class="text-center mt-4 pb-5" hidden>No results found.</p>
        <p id="loadingMsg" class="text-center mt-5 text-muted">Loading cards…</p>
    </div>

    <!-- Settings / Sync modal -->
    <div class="modal fade" id="settingsModal" tabindex="-1" aria-labelledby="settingsModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title share-tech-regular" id="settingsModalLabel">Sync Settings</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <p class="small text-muted">Use the same sync code on all devices to share your collection.</p>
                    <label class="form-label" for="syncCodeDisplay">Your sync code</label>
                    <div class="input-group mb-3">
                        <input type="text" class="form-control font-monospace" id="syncCodeDisplay" readonly>
                        <button type="button" class="btn btn-outline-primary" id="copySyncCodeBtn">Copy</button>
                    </div>
                    <label class="form-label" for="syncCodeInput">Switch to another device&apos;s code</label>
                    <div class="input-group">
                        <input type="text" class="form-control font-monospace" id="syncCodeInput" placeholder="e.g. a3f9-k2m1">
                        <button type="button" class="btn btn-primary" id="applySyncCodeBtn">Apply</button>
                    </div>
                    <p id="settingsFeedback" class="small mt-2 mb-0" aria-live="polite"></p>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.1/dist/umd/supabase.min.js" crossorigin="anonymous"></script>
    <script src="config.js"></script>
    <script src="script.js"></script>
</body>
</html>
